<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bible in a Year daily reading tracker — Putney Methodist Church" />
  <meta name="theme-color" content="#DA1E28" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bible in a Year" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>Bible in a Year</title>
  <script type="module" src="./src/main.js"></script>
</head>
<body class="min-h-screen bg-gray-100 font-sans antialiased">

  <!-- Header -->
  <header class="bg-methodist-red text-white shadow-md">
    <div class="max-w-lg mx-auto px-4 py-5">
      <div class="flex items-center gap-3">
        <div class="text-3xl">✝</div>
        <div>
          <h1 class="text-xl font-bold leading-tight">Bible in a Year</h1>
          <p class="text-sm text-red-200">Putney Methodist Church · 2026–2027</p>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 py-6 space-y-5">

    <!-- Today's date -->
    <p id="today-date" class="text-sm font-medium text-gray-500"></p>

    <!-- Reading card -->
    <section class="bg-white rounded-2xl shadow-sm p-5">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Today's Reading</h2>
      <div id="reading-card">
        <div class="animate-pulse space-y-3">
          <div class="h-4 bg-gray-200 rounded w-1/3"></div>
          <div class="h-10 bg-gray-100 rounded-lg"></div>
          <div class="h-10 bg-gray-100 rounded-lg"></div>
          <div class="h-10 bg-gray-100 rounded-lg"></div>
        </div>
      </div>
    </section>

    <!-- Notifications -->
    <section id="notifications-section" class="bg-white rounded-2xl shadow-sm p-5">
      <!-- Rendered by JS -->
    </section>

  </main>

  <!-- Footer -->
  <footer class="max-w-lg mx-auto px-4 py-8 text-center text-xs text-gray-400">
    <div class="flex items-center justify-center gap-2 mb-1">
      <span class="inline-block w-6 h-1 bg-methodist-gold rounded"></span>
      <span>The Methodist Church</span>
      <span class="inline-block w-6 h-1 bg-methodist-gold rounded"></span>
    </div>
    <p>Reading plan by Rev'd Geoffrey Farrar · Putney Methodist Church</p>
    <p class="mt-1">28 March 2026 – 27 March 2027</p>
  </footer>

</body>
</html>
